# Training Configuration

# Override default settings for training runs
training:
  total_steps: 50000
  eval_interval: 500
  save_interval: 2000
  log_interval: 50

# Model for training
model:
  name: "Qwen/Qwen2.5-1.5B-Instruct"
  lora:
    enabled: true
    r: 32
    alpha: 64

# PPO for training
ppo:
  lr: 2.0e-5
  epochs: 3
  batch_size: 128
  mini_batch_size: 16
  gamma: 0.99
  lam: 0.95

# Environment for training
environment:
  name: "code"
  max_steps: 30

# Reward shaping for training
reward:
  success_reward: 1.0
  failure_reward: -0.5
  step_penalty: -0.02
  format_bonus: 0.05
  intermediate_bonus: 0.05
